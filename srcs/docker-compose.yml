services:
  mariadb:
    image: mariadb
    build:
      context: ./requirements/mariadb
    container_name: mariadb
    restart: always
    env_file: .env
    volumes:
      - mariadb:/var/lib/mysql
    networks:
      - inception
    secrets:
      - db_user_password
      - db_root_password

  wordpress:
    image: wordpress
    build:
      context: ./requirements/wordpress
    container_name: wordpress
    restart: always
    depends_on:
      - mariadb
      - redis
    env_file: .env
    volumes:
      - wordpress:/var/www/html
    networks:
      - inception
    secrets:
      - db_user_password
      - db_root_password
      - wp_admin_password
      - wp_user_password

  nginx:
    image: nginx
    build:
      context: ./requirements/nginx
    container_name: nginx
    restart: always
    depends_on:
      - wordpress
    ports:
      - "443:443"
    volumes:
      - wordpress:/var/www/html
      - nginx_logs:/var/log/nginx
    networks:
      - inception

  redis:
    image: redis
    build:
      context: ./requirements/redis
    container_name: redis
    restart: always
    networks:
      - inception

  adminer:
    image: adminer
    build:
      context: ./requirements/adminer
    container_name: adminer
    restart: always
    depends_on:
      - mariadb
    ports:
      - "8080:8080"
    networks:
      - inception

  static_site:
    image: static_site
    build:
      context: ./requirements/static_site
    container_name: static_site
    restart: always
    ports:
      - "8081:8081"
    networks:
      - inception

  ftp:
    image: ftp
    build:
      context: ./requirements/ftp
    container_name: ftp
    restart: always
    depends_on:
      - wordpress
    ports:
      - "21:21"
      - "40000-40009:40000-40009"
    volumes:
      - wordpress:/var/www/html
    networks:
      - inception
    secrets:
      - ftp_password
    environment:
      FTP_USER: ${FTP_USER}

  goaccess:
    image: goaccess
    build:
      context: ./requirements/goaccess
    container_name: goaccess
    restart: always
    ports:
      - "7890:7890"
    volumes:
      - nginx_logs:/var/log/nginx:ro
      - wordpress:/var/www/html
    networks:
      - inception

  cowsay:
    image: cowsay
    build:
      context: ./requirements/cowsay
    container_name: cowsay
    restart: always
    ports:
      - "4243:4242"
    networks:
      - inception

networks:
  inception:
    driver: bridge

volumes:
  mariadb:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /home/eala-lah/data/mariadb
  wordpress:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /home/eala-lah/data/wordpress
  nginx_logs:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /home/eala-lah/data/logs

secrets:
  db_user_password:
    file: ../secrets/db_user_password.txt
  db_root_password:
    file: ../secrets/db_root_password.txt
  wp_admin_password:
    file: ../secrets/wp_admin_password.txt
  wp_user_password:
    file: ../secrets/wp_user_password.txt
  ftp_password:
    file: ../secrets/ftp_password.txt

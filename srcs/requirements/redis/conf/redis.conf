# Network Settings
# Bind to all interfaces so the WordPress container can connect to it
bind	0.0.0.0
port	6379

# Memory Management (Optimized for WordPress Object Caching)
# Hard limit memory to prevent the container from crashing the host VM
maxmemory			256mb
# Evict the least recently used (LRU) keys when the memory limit is reached
maxmemory-policy	allkeys-lru

# Security Settings
# Disabled because Redis is securely isolated within the Docker bridge network
protected-mode	no
